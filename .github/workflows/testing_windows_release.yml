name: testing_windows_release

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: testing-windows-release
  cancel-in-progress: false

jobs:
  windows:
    if: github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: windows-2022
    runs-on: ${{ matrix.runner }}
    env:
      CARGO_INCREMENTAL: 0
      CARGO_HOME: C:\c
      CARGO_TARGET_DIR: C:\t
      CI: ''
    steps:
      - uses: actions/checkout@v4
        with:
          ref: testing
      - name: Set up Rust
        run: |
          if (-not (Get-Command rustc -ErrorAction SilentlyContinue)) {
            Invoke-WebRequest -Uri https://win.rustup.rs/x86_64 -OutFile rustup-init.exe
            .\rustup-init.exe -y --default-toolchain stable
          }
          "$env:USERPROFILE\.cargo\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        shell: powershell
      - name: Ensure Visual Studio Build Tools
        run: |
          function Find-VsDevShell {
            $candidatePaths = @(
              "C:\Program Files\Microsoft Visual Studio\2022\Community\Common7\Tools\Launch-VsDevShell.ps1",
              "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\Tools\Launch-VsDevShell.ps1",
              "C:\Program Files\Microsoft Visual Studio\2022\Professional\Common7\Tools\Launch-VsDevShell.ps1",
              "C:\Program Files\Microsoft Visual Studio\2022\BuildTools\Common7\Tools\Launch-VsDevShell.ps1"
            )

            $direct = $candidatePaths | Where-Object { Test-Path $_ } | Select-Object -First 1
            if ($direct) { return $direct }

            $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
            if (Test-Path $vswhere) {
              $installations = & $vswhere -all -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
              foreach ($installation in $installations) {
                $path = Join-Path $installation "Common7\Tools\Launch-VsDevShell.ps1"
                if (Test-Path $path) { return $path }
              }
            }

            return $null
          }

          $existing = Find-VsDevShell
          if ($existing) {
            Write-Host "Visual Studio Build Tools already available at $existing"
            exit 0
          }

          Invoke-WebRequest -Uri https://aka.ms/vs/17/release/vs_buildtools.exe -OutFile vs_buildtools.exe
          $arguments = @(
            "--quiet",
            "--wait",
            "--norestart",
            "--installPath", "C:\Program Files\Microsoft Visual Studio\2022\BuildTools",
            "--add", "Microsoft.VisualStudio.Workload.VCTools",
            "--add", "Microsoft.VisualStudio.Component.VC.Tools.x86.x64",
            "--add", "Microsoft.VisualStudio.Component.Windows11SDK.26100",
            "--includeRecommended"
          )
          & .\vs_buildtools.exe @arguments
          $exitCode = $LASTEXITCODE
          Write-Host "Visual Studio Build Tools installer exited with $exitCode"
          if ($exitCode -ne 0 -and $exitCode -ne 3010) {
            throw "Visual Studio Build Tools installer failed with exit code $exitCode"
          }

          $installed = Find-VsDevShell
          if (-not $installed) {
            Write-Host "Visual Studio installer did not expose Launch-VsDevShell.ps1; dumping installer state"
            $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
            if (Test-Path $vswhere) {
              & $vswhere -all -products * -format json
            }
            Get-ChildItem -Path "C:\Program Files\Microsoft Visual Studio" -Recurse -Filter Launch-VsDevShell.ps1 -ErrorAction SilentlyContinue | Select-Object -ExpandProperty FullName
            throw "Visual Studio Build Tools installer completed, but Launch-VsDevShell.ps1 was still not found"
          }
          Write-Host "Visual Studio Build Tools installed at $installed"
        shell: powershell
      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: testing-windows-workspace-${{ matrix.arch }}
          cache-on-failure: true
          cache-workspace-crates: true
      - name: Enable long paths
        run: |
          git config --system core.longpaths true
          New-ItemProperty -Path HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem -Name LongPathsEnabled -Value 1 -PropertyType DWord -Force
        shell: powershell
      - name: Install Inno Setup
        run: |
          if (Get-Command iscc.exe -ErrorAction SilentlyContinue) {
            Write-Host "Inno Setup already available"
            exit 0
          }

          for ($attempt = 1; $attempt -le 3; $attempt++) {
            choco install innosetup --no-progress -y
            if ($LASTEXITCODE -eq 0) { break }
            if ($attempt -eq 3) { exit $LASTEXITCODE }
            Start-Sleep -Seconds (15 * $attempt)
          }
        shell: powershell
      - name: Build Windows installer
        run: script/bundle-windows.ps1 -Architecture ${{ matrix.arch }}
        shell: powershell
      - uses: actions/upload-artifact@v3
        with:
          name: Zed-${{ matrix.arch }}.exe
          path: target/Zed-${{ matrix.arch }}.exe
          if-no-files-found: error
      - uses: actions/upload-artifact@v3
        with:
          name: zed-remote-server-windows-${{ matrix.arch }}.zip
          path: target/zed-remote-server-windows-${{ matrix.arch }}.zip
          if-no-files-found: error

  publish_windows:
    needs:
      - windows
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v3
        with:
          path: artifacts
      - name: Upload Windows assets to testing release
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN || github.token }}
          SERVER_URL: ${{ github.server_url }}
          REPOSITORY: ${{ github.repository }}
          TAG: testing-latest
          TARGET: ${{ github.sha }}
        run: |
          python3 <<'PY'
          import json
          import mimetypes
          import os
          from pathlib import Path
          import uuid
          import urllib.error
          import urllib.parse
          import urllib.request

          token = os.environ["GITEA_TOKEN"]
          server_url = os.environ["SERVER_URL"].rstrip("/")
          repository = os.environ["REPOSITORY"]
          tag = os.environ["TAG"]
          target = os.environ["TARGET"]
          api_root = f"{server_url}/api/v1/repos/{repository}"

          def request(method, url, data=None, headers=None):
              headers = dict(headers or {})
              headers["Authorization"] = f"token {token}"
              request = urllib.request.Request(url, data=data, headers=headers, method=method)
              try:
                  with urllib.request.urlopen(request) as response:
                      body = response.read()
              except urllib.error.HTTPError as error:
                  body = error.read().decode("utf-8", errors="replace")
                  raise SystemExit(f"{method} {url} failed: HTTP {error.code}\n{body}")
              return json.loads(body.decode("utf-8")) if body else None

          def get_release():
              url = f"{api_root}/releases/tags/{urllib.parse.quote(tag, safe='')}"
              try:
                  return request("GET", url)
              except SystemExit as error:
                  if "HTTP 404" not in str(error):
                      raise
                  payload = {
                      "tag_name": tag,
                      "target_commitish": target,
                      "name": "Testing latest",
                      "body": f"Automated build from testing at {target}.",
                      "draft": False,
                      "prerelease": True,
                  }
                  return request(
                      "POST",
                      f"{api_root}/releases",
                      json.dumps(payload).encode("utf-8"),
                      {"Content-Type": "application/json"},
                  )

          def upload_asset(release_id, path):
              name = path.name
              for asset in release.get("assets", []):
                  if asset.get("name") == name:
                      request("DELETE", f"{api_root}/releases/assets/{asset['id']}")

              boundary = "----gitea-boundary-" + uuid.uuid4().hex
              content_type = mimetypes.guess_type(name)[0] or "application/octet-stream"
              file_bytes = path.read_bytes()
              body = b"".join([
                  f"--{boundary}\r\n".encode(),
                  f'Content-Disposition: form-data; name="attachment"; filename="{name}"\r\n'.encode(),
                  f"Content-Type: {content_type}\r\n\r\n".encode(),
                  file_bytes,
                  f"\r\n--{boundary}--\r\n".encode(),
              ])
              quoted_name = urllib.parse.quote(name)
              request(
                  "POST",
                  f"{api_root}/releases/{release_id}/assets?name={quoted_name}",
                  body,
                  {"Content-Type": f"multipart/form-data; boundary={boundary}"},
              )
              print(f"Uploaded {name}")

          release = get_release()
          release_id = release["id"]
          files = [path for path in Path("artifacts").rglob("*") if path.is_file()]
          if not files:
              raise SystemExit("No artifacts found to publish")
          for path in files:
              upload_asset(release_id, path)
          PY
