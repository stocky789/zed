name: testing_release

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: testing-release
  cancel-in-progress: true

jobs:
  linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
    runs-on: ${{ matrix.runner }}
    env:
      CARGO_INCREMENTAL: 0
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
      CC: clang
      CC_x86_64_unknown_linux_musl: musl-gcc
      CXX: clang++
    steps:
      - uses: actions/checkout@v4
      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: testing-linux-${{ matrix.arch }}
          cache-on-failure: true
          cache-workspace-crates: true
      - name: Install Linux dependencies
        run: ./script/linux
      - name: Download WASI SDK
        run: ./script/download-wasi-sdk
      - name: Build Linux bundle
        run: ./script/bundle-linux
      - uses: actions/upload-artifact@v4
        with:
          name: zed-linux-${{ matrix.arch }}.tar.gz
          path: target/release/zed-linux-${{ matrix.arch }}.tar.gz
          if-no-files-found: error
      - uses: actions/upload-artifact@v4
        with:
          name: zed-remote-server-linux-${{ matrix.arch }}.gz
          path: target/zed-remote-server-linux-${{ matrix.arch }}.gz
          if-no-files-found: error

  publish_linux:
    needs:
      - linux
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: zed-*linux-*
          path: artifacts
          merge-multiple: true
      - name: Publish Linux testing release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: testing-latest
        run: |
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --title "Testing latest" \
              --notes "Automated builds from the testing branch." \
              --target "$GITHUB_SHA" \
              --prerelease \
              --latest=false
          fi
          gh release upload "$TAG" artifacts/* --clobber
